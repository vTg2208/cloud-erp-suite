version: '3.8'

services:
  api-db:
    build: 
      context: ./API-DB
      dockerfile: Dockerfile
    container_name: erp-api-db
    ports:
      - "8000:8000"
    environment:
      - AI_SERVICE_URL=http://ai-service:8001
    networks:
      - erp-network

  ai-service:
    build:
      context: ./AI-Service
      dockerfile: Dockerfile
    container_name: erp-ai-service
    ports:
      - "8001:8001"
    networks:
      - erp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp-frontend
    ports:
      - "5173:80"
    depends_on:
      - api-db
    networks:
      - erp-network

networks:
  erp-network:
    driver: bridge
